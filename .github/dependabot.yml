version: 2
updates:
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
